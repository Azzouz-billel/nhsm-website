<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Server error — NHSM Hub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0b0926;
      --surface: #17123d;
      --text: #f3eaff;
      --text-muted: #b3a6e6;
      --border-strong: #6a52d6;
      --brand: #ff3df0;
      --font-display: "Press Start 2P", "VT323", monospace;
      --font-body: "VT323", "Press Start 2P", monospace;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      text-align: center;
      padding: 24px;
    }
    .wrap { max-width: 60ch; }
    .code {
      font-family: var(--font-display);
      font-size: clamp(3rem, 14vw, 7rem);
      line-height: 1;
      color: var(--brand);
      text-shadow: 0 0 10px rgba(255, 61, 240, 0.9);
      margin-bottom: 24px;
    }
    h1 { font-family: var(--font-display); font-size: clamp(1.1rem, 5vw, 1.6rem); margin: 0 0 16px; }
    p { color: var(--text-muted); font-size: 1.25rem; margin: 0 0 32px; }
    a {
      display: inline-block;
      font-family: var(--font-display);
      font-size: 0.8rem;
      padding: 14px 22px;
      color: #fff;
      background: var(--brand);
      border: 2px solid var(--border-strong);
      box-shadow: 4px 4px 0 rgba(0, 0, 0, 0.55);
      text-decoration: none;
    }
    a:hover { transform: translate(-2px, -2px); box-shadow: 6px 6px 0 rgba(0, 0, 0, 0.55); }
  </style>
</head>
<body>
  <div class="wrap">
    <p class="code" aria-hidden="true">500</p>
    <h1>Something broke on our end.</h1>
    <p>A glitch in the mainframe. Try again in a moment — if it keeps happening, let us know.</p>
    <a href="/">Back to home</a>
  </div>
</body>
</html>
